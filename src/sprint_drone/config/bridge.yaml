# ros-gz-bridge topic mapping for Gazebo Harmonic ↔ ROS2 Jazzy
#
# Used by sim_gazebo.launch.py:
#   ros2 run ros_gz_bridge parameter_bridge --ros-args -p config_file:=<path>
#
# Direction notation:
#   GZ_TO_ROS  — Gazebo publishes, ROS2 subscribes
#   ROS_TO_GZ  — ROS2 publishes, Gazebo subscribes

- ros_topic_name: "/drone/camera/down/image_raw"
  gz_topic_name: "/gz/drone/camera/down"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/drone/camera/down/camera_info"
  gz_topic_name: "/gz/drone/camera/down/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

- ros_topic_name: "/drone/imu/data"
  gz_topic_name: "/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# PX4 SITL mode: x500 drone model publishes to a different camera topic.
# Uncomment and adjust gz_topic_name to match the PX4 x500 sensor name.
# - ros_topic_name: "/drone/camera/down/image_raw"
#   gz_topic_name: "/x500/camera"
#   ros_type_name: "sensor_msgs/msg/Image"
#   gz_type_name: "gz.msgs.Image"
#   direction: GZ_TO_ROS

# ── PX4 uORB ↔ ROS2 (via micro-XRCE-DDS, not gz-bridge) ─────────────────
# These topics are bridged by the micro-XRCE-DDS agent, not ros-gz-bridge.
# They are listed here for documentation only (no direction field needed).
#
# /fmu/out/vehicle_attitude          → px4_msgs/msg/VehicleAttitude
# /fmu/out/vehicle_local_position    → px4_msgs/msg/VehicleLocalPosition
# /fmu/out/battery_status            → px4_msgs/msg/BatteryStatus
# /fmu/in/offboard_control_mode      ← px4_msgs/msg/OffboardControlMode
# /fmu/in/trajectory_setpoint        ← px4_msgs/msg/TrajectorySetpoint
# /fmu/in/vehicle_command            ← px4_msgs/msg/VehicleCommand
#
# Start the agent with:
#   MicroXRCEAgent udp4 -p 8888
